<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <defs>
    <linearGradient id="cardBg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>

  <rect width="400" height="200" rx="12" fill="url(#cardBg3)" stroke="#222" stroke-width="1"/>
  <rect x="0" y="0" width="400" height="3" rx="12" fill="url(#accent3)" opacity="0.8"/>

  <!-- icon -->
  <g transform="translate(30, 30)">
    <rect width="40" height="40" rx="10" fill="#a855f7" opacity="0.12"/>
    <!-- users icon -->
    <g transform="translate(7, 9)" fill="none" stroke="#a855f7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="6" r="4"/>
      <path d="M1 20c0-4 4-7 8-7s8 3 8 7"/>
      <circle cx="19" cy="7" r="3"/>
      <path d="M21 20c2-1 4-3 4-6"/>
    </g>
  </g>

  <!-- title -->
  <text x="82" y="50" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="white">Community</text>
  <text x="82" y="68" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">Submit, vouch, and discover wallets</text>

  <!-- submission flow -->
  <g transform="translate(30, 92)">
    <!-- step 1: submit -->
    <g>
      <rect x="0" y="0" width="95" height="80" rx="8" fill="#a855f7" opacity="0.06" stroke="#a855f7" stroke-width="0.5" stroke-opacity="0.2"/>
      <text x="47" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
        +
      </text>
      <text x="47" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#a855f7">Submit</text>
      <text x="47" y="66" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">Add wallet</text>
    </g>

    <!-- arrow -->
    <g transform="translate(105, 35)">
      <line x1="0" y1="0" x2="20" y2="0" stroke="#4b5563" stroke-width="1.5" stroke-dasharray="3,3"/>
      <polygon points="20,-4 28,0 20,4" fill="#4b5563"/>
    </g>

    <!-- step 2: vouch -->
    <g transform="translate(143, 0)">
      <rect x="0" y="0" width="95" height="80" rx="8" fill="#ec4899" opacity="0.06" stroke="#ec4899" stroke-width="0.5" stroke-opacity="0.2"/>
      <g transform="translate(33, 14)">
        <text x="15" y="16" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#ec4899">
          <animate attributeName="font-size" values="18;22;18" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
          ^
        </text>
      </g>
      <text x="47" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ec4899">Vouch</text>
      <text x="47" y="66" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">Community vote</text>
    </g>

    <!-- arrow -->
    <g transform="translate(248, 35)">
      <line x1="0" y1="0" x2="20" y2="0" stroke="#4b5563" stroke-width="1.5" stroke-dasharray="3,3"/>
      <polygon points="20,-4 28,0 20,4" fill="#4b5563"/>
    </g>

    <!-- step 3: approved -->
    <g transform="translate(286, 0)">
      <rect x="0" y="0" width="84" height="80" rx="8" fill="#22c55e" opacity="0.06" stroke="#22c55e" stroke-width="0.5" stroke-opacity="0.2"/>
      <g transform="translate(28, 14)">
        <circle cx="14" cy="10" r="10" fill="none" stroke="#22c55e" stroke-width="1.5"/>
        <polyline points="9,10 13,14 20,7" fill="none" stroke="#22c55e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <animate attributeName="stroke-dashoffset" values="20;0" dur="0.5s" begin="1s" fill="freeze"/>
          <animate attributeName="stroke-dasharray" values="0,20;20,0" dur="0.5s" begin="1s" fill="freeze"/>
        </polyline>
      </g>
      <text x="42" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#22c55e">Approved</text>
      <text x="42" y="66" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">Listed</text>
    </g>
  </g>
</svg>
