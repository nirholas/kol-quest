<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 50" fill="none">
  <defs>
    <linearGradient id="pillBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
  </defs>

  <!-- Next.js -->
  <g>
    <rect x="0" y="5" width="82" height="30" rx="15" fill="url(#pillBg)" stroke="#333" stroke-width="0.8"/>
    <circle cx="18" cy="20" r="6" fill="white"/>
    <text x="17" y="23" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="800" fill="black">N</text>
    <text x="48" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#e5e7eb" font-weight="500">Next.js</text>
  </g>

  <!-- React -->
  <g transform="translate(92, 0)">
    <rect x="0" y="5" width="76" height="30" rx="15" fill="url(#pillBg)" stroke="#333" stroke-width="0.8"/>
    <circle cx="17" cy="20" r="6" fill="none" stroke="#61DAFB" stroke-width="1.2"/>
    <circle cx="17" cy="20" r="1.5" fill="#61DAFB"/>
    <text x="44" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#61DAFB" font-weight="500">React</text>
  </g>

  <!-- TypeScript -->
  <g transform="translate(178, 0)">
    <rect x="0" y="5" width="104" height="30" rx="15" fill="url(#pillBg)" stroke="#333" stroke-width="0.8"/>
    <rect x="9" y="13" width="14" height="14" rx="2" fill="#3178C6"/>
    <text x="16" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="white">TS</text>
    <text x="60" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3178C6" font-weight="500">TypeScript</text>
  </g>

  <!-- Tailwind -->
  <g transform="translate(292, 0)">
    <rect x="0" y="5" width="90" height="30" rx="15" fill="url(#pillBg)" stroke="#333" stroke-width="0.8"/>
    <text x="16" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#38BDF8" font-weight="700">~</text>
    <text x="54" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#38BDF8" font-weight="500">Tailwind</text>
  </g>

  <!-- PostgreSQL -->
  <g transform="translate(392, 0)">
    <rect x="0" y="5" width="100" height="30" rx="15" fill="url(#pillBg)" stroke="#333" stroke-width="0.8"/>
    <circle cx="18" cy="20" r="7" fill="none" stroke="#336791" stroke-width="1.2"/>
    <text x="17" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#336791">P</text>
    <text x="58" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#336791" font-weight="500">Postgres</text>
  </g>

  <!-- Drizzle -->
  <g transform="translate(502, 0)">
    <rect x="0" y="5" width="82" height="30" rx="15" fill="url(#pillBg)" stroke="#333" stroke-width="0.8"/>
    <text x="16" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#C5F74F">*</text>
    <text x="48" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#C5F74F" font-weight="500">Drizzle</text>
  </g>

  <!-- Solana -->
  <g transform="translate(594, 0)">
    <rect x="0" y="5" width="80" height="30" rx="15" fill="url(#pillBg)" stroke="#333" stroke-width="0.8"/>
    <circle cx="17" cy="20" r="6" fill="none" stroke="url(#solBadge)" stroke-width="1.2"/>
    <text x="47" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#14F195" font-weight="500">Solana</text>
  </g>
  <linearGradient id="solBadge" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#9945FF"/>
    <stop offset="100%" style="stop-color:#14F195"/>
  </linearGradient>

  <!-- Playwright -->
  <g transform="translate(684, 0)">
    <rect x="0" y="5" width="98" height="30" rx="15" fill="url(#pillBg)" stroke="#333" stroke-width="0.8"/>
    <text x="17" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#2EAD33" font-weight="700">></text>
    <text x="58" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#2EAD33" font-weight="500">Playwright</text>
  </g>
</svg>
