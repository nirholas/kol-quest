<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1D9BF0"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>

  <rect width="400" height="200" rx="12" fill="url(#cardBg)" stroke="#222" stroke-width="1"/>

  <!-- top accent -->
  <rect x="0" y="0" width="400" height="3" rx="12" fill="url(#accent)" opacity="0.8"/>

  <!-- icon -->
  <g transform="translate(30, 30)">
    <rect width="40" height="40" rx="10" fill="#1D9BF0" opacity="0.12"/>
    <!-- trophy icon -->
    <g transform="translate(8, 7)" fill="none" stroke="#1D9BF0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 2h12v6a6 6 0 0 1-12 0V2z"/>
      <path d="M18 4h2a2 2 0 0 1 0 4h-2"/>
      <path d="M6 4H4a2 2 0 0 0 0 4h2"/>
      <path d="M12 14v4"/>
      <path d="M8 18h8"/>
    </g>
  </g>

  <!-- title -->
  <text x="82" y="50" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="white">Leaderboards</text>
  <text x="82" y="68" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">Multi-source rankings across chains</text>

  <!-- mini leaderboard rows -->
  <g transform="translate(30, 90)">
    <!-- row 1 -->
    <rect x="0" y="0" width="340" height="30" rx="6" fill="#ffffff" opacity="0.03"/>
    <text x="12" y="20" font-family="monospace" font-size="11" fill="#6b7280">#1</text>
    <circle cx="48" cy="15" r="8" fill="#a855f7" opacity="0.2"/>
    <text x="48" y="18" text-anchor="middle" font-family="monospace" font-size="8" fill="#a855f7">W</text>
    <text x="65" y="20" font-family="system-ui, sans-serif" font-size="11" fill="#e5e7eb">CryptoWhale</text>
    <text x="280" y="20" text-anchor="end" font-family="monospace" font-size="11" fill="#22c55e" font-weight="600">+842.5 SOL</text>
    <text x="330" y="20" text-anchor="end" font-family="monospace" font-size="10" fill="#6b7280">89%</text>
    <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze"/>
  </g>

  <g transform="translate(30, 125)">
    <!-- row 2 -->
    <rect x="0" y="0" width="340" height="30" rx="6" fill="#ffffff" opacity="0.02"/>
    <text x="12" y="20" font-family="monospace" font-size="11" fill="#6b7280">#2</text>
    <circle cx="48" cy="15" r="8" fill="#1D9BF0" opacity="0.2"/>
    <text x="48" y="18" text-anchor="middle" font-family="monospace" font-size="8" fill="#1D9BF0">D</text>
    <text x="65" y="20" font-family="system-ui, sans-serif" font-size="11" fill="#e5e7eb">DegenKing</text>
    <text x="280" y="20" text-anchor="end" font-family="monospace" font-size="11" fill="#22c55e" font-weight="600">+531.2 SOL</text>
    <text x="330" y="20" text-anchor="end" font-family="monospace" font-size="10" fill="#6b7280">76%</text>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.15s" fill="freeze"/>
  </g>

  <g transform="translate(30, 160)">
    <!-- row 3 -->
    <rect x="0" y="0" width="340" height="30" rx="6" fill="#ffffff" opacity="0.02"/>
    <text x="12" y="20" font-family="monospace" font-size="11" fill="#6b7280">#3</text>
    <circle cx="48" cy="15" r="8" fill="#22c55e" opacity="0.2"/>
    <text x="48" y="18" text-anchor="middle" font-family="monospace" font-size="8" fill="#22c55e">S</text>
    <text x="65" y="20" font-family="system-ui, sans-serif" font-size="11" fill="#e5e7eb">SolSniper</text>
    <text x="280" y="20" text-anchor="end" font-family="monospace" font-size="11" fill="#22c55e" font-weight="600">+412.8 SOL</text>
    <text x="330" y="20" text-anchor="end" font-family="monospace" font-size="10" fill="#6b7280">72%</text>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.3s" fill="freeze"/>
  </g>
</svg>
