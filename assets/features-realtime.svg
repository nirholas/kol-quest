<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <defs>
    <linearGradient id="cardBg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#1D9BF0"/>
    </linearGradient>
  </defs>

  <rect width="400" height="200" rx="12" fill="url(#cardBg2)" stroke="#222" stroke-width="1"/>
  <rect x="0" y="0" width="400" height="3" rx="12" fill="url(#accent2)" opacity="0.8"/>

  <!-- icon -->
  <g transform="translate(30, 30)">
    <rect width="40" height="40" rx="10" fill="#22c55e" opacity="0.12"/>
    <!-- activity/pulse icon -->
    <g transform="translate(8, 12)" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="0,8 6,8 9,2 15,14 18,8 24,8"/>
    </g>
    <!-- pulse dot -->
    <circle cx="36" cy="4" r="3" fill="#22c55e">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- title -->
  <text x="82" y="50" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="white">Real-Time Tracking</text>
  <text x="82" y="68" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">Live trades, token discovery, wallet monitor</text>

  <!-- live feed mockup -->
  <g transform="translate(30, 88)">
    <!-- trade 1 - buy -->
    <g>
      <rect x="0" y="0" width="340" height="28" rx="6" fill="#22c55e" opacity="0.05"/>
      <text x="10" y="18" font-family="monospace" font-size="10" fill="#22c55e" font-weight="600">BUY</text>
      <text x="50" y="18" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">0xf3a...8d2</text>
      <text x="152" y="18" font-family="system-ui, sans-serif" font-size="10" fill="#e5e7eb">BONK</text>
      <text x="280" y="18" text-anchor="end" font-family="monospace" font-size="10" fill="#22c55e">+$12,420</text>
      <text x="330" y="18" text-anchor="end" font-family="monospace" font-size="9" fill="#6b7280">2s ago</text>
      <animate attributeName="opacity" values="0;1" dur="0.4s" fill="freeze"/>
    </g>
  </g>

  <g transform="translate(30, 120)">
    <!-- trade 2 - sell -->
    <g>
      <rect x="0" y="0" width="340" height="28" rx="6" fill="#ef4444" opacity="0.05"/>
      <text x="10" y="18" font-family="monospace" font-size="10" fill="#ef4444" font-weight="600">SELL</text>
      <text x="50" y="18" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">0x8b1...4e7</text>
      <text x="152" y="18" font-family="system-ui, sans-serif" font-size="10" fill="#e5e7eb">WIF</text>
      <text x="280" y="18" text-anchor="end" font-family="monospace" font-size="10" fill="#ef4444">-$3,200</text>
      <text x="330" y="18" text-anchor="end" font-family="monospace" font-size="9" fill="#6b7280">5s ago</text>
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.2s" fill="freeze"/>
    </g>
  </g>

  <g transform="translate(30, 152)">
    <!-- trade 3 - buy -->
    <g>
      <rect x="0" y="0" width="340" height="28" rx="6" fill="#22c55e" opacity="0.05"/>
      <text x="10" y="18" font-family="monospace" font-size="10" fill="#22c55e" font-weight="600">BUY</text>
      <text x="50" y="18" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">0xc2d...1a9</text>
      <text x="152" y="18" font-family="system-ui, sans-serif" font-size="10" fill="#e5e7eb">POPCAT</text>
      <text x="280" y="18" text-anchor="end" font-family="monospace" font-size="10" fill="#22c55e">+$8,750</text>
      <text x="330" y="18" text-anchor="end" font-family="monospace" font-size="9" fill="#6b7280">8s ago</text>
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.4s" fill="freeze"/>
    </g>
  </g>
</svg>
